<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>LiveDrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .container { max-width: 400px; width: 100%; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      appearance: none;
      margin-bottom: 24px;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #555; }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-live { background: #ff3b30; color: #fff; }
    .btn-stop { background: #555; color: #fff; margin-top: 16px; }
    .btn-copy { background: #2a2a2a; color: #fff; margin-top: 12px; font-size: 14px; padding: 12px; }

    .live-section { display: none; margin-top: 32px; }
    .live-section.active { display: block; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .live-dot {
      width: 12px; height: 12px;
      background: #ff3b30;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.6); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(255, 59, 48, 0); }
    }
    .live-text {
      font-size: 14px;
      font-weight: 700;
      color: #ff3b30;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .url-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      word-break: break-all;
      color: #aaa;
      margin-bottom: 4px;
    }

    .listener-count {
      margin-top: 24px;
      font-size: 14px;
      color: #888;
      text-align: center;
    }
    .listener-count span { color: #30d158; font-weight: 600; }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LiveDrop</h1>

    <div id="setupSection">
      <label for="deviceSelect">Audio Input</label>
      <select id="deviceSelect">
        <option value="">Loading devices...</option>
      </select>
      <label for="sessionName">Stream Name <span style="color:#555">(optional)</span></label>
      <input type="text" id="sessionName" placeholder="e.g. my-stream" autocomplete="off" spellcheck="false"
        style="width:100%;padding:12px 16px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:10px;font-size:16px;font-family:inherit;margin-bottom:24px;">
      <button class="btn btn-live" id="goLiveBtn">Go Live</button>
    </div>

    <div class="live-section" id="liveSection">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">Live</span>
      </div>

      <div class="url-box" id="shareUrl"></div>
      <button class="btn btn-copy" id="copyBtn">Copy Link</button>

      <canvas id="qrCanvas" width="200" height="200" style="display:none;margin:16px auto;border-radius:10px;background:#fff;"></canvas>

      <div class="listener-count">
        <span id="listenerCount">0</span> listeners
      </div>

      <button class="btn btn-stop" id="stopBtn">Stop</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script type="module" src="/js/sender/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
