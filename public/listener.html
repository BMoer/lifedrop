<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveDrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .status {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      min-height: 20px;
    }
    .status.error { color: #ff3b30; }
    .status.connected { color: #30d158; }

    .btn-play {
      width: 100%;
      padding: 20px;
      background: #30d158;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
      display: none;
    }
    .btn-play:hover { opacity: 0.85; }
    .btn-play.visible { display: block; }

    .listening-section {
      display: none;
      margin-top: 16px;
    }
    .listening-section.active { display: block; }

    .live-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .live-dot {
      width: 12px; height: 12px;
      background: #ff3b30;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.6); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(255, 59, 48, 0); }
    }
    .live-text {
      font-size: 14px;
      font-weight: 700;
      color: #ff3b30;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .level-meter {
      width: 100%;
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .level-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #30d158, #30d158);
      border-radius: 3px;
      transition: width 0.08s linear;
    }

    .listener-count {
      font-size: 14px;
      color: #888;
    }
    .listener-count span { color: #30d158; font-weight: 600; }

    .ended {
      display: none;
      margin-top: 32px;
      font-size: 16px;
      color: #888;
    }
    .ended.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LiveDrop</h1>
    <div class="status" id="status">Connecting...</div>

    <button class="btn-play" id="playBtn">Play</button>

    <div class="listening-section" id="listeningSection">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">Listening</span>
      </div>
      <div class="level-meter">
        <div class="level-bar" id="levelBar"></div>
      </div>
      <div class="listener-count">
        <span id="listenerCount">0</span> listeners
      </div>
    </div>

    <div class="ended" id="endedSection">Stream ended.</div>

    <!-- <div id="debug" style="margin-top:32px;padding:12px;background:#111;border:1px solid #333;border-radius:8px;font-size:11px;color:#888;max-height:200px;overflow-y:auto;white-space:pre-wrap;font-family:monospace;"></div> -->
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const playBtn = document.getElementById('playBtn');
    const listeningSection = document.getElementById('listeningSection');
    const levelBar = document.getElementById('levelBar');
    const listenerCount = document.getElementById('listenerCount');
    const endedSection = document.getElementById('endedSection');

    const sessionId = location.pathname.split('/s/')[1];
    if (!sessionId) {
      statusEl.textContent = 'No session ID in URL.';
      statusEl.classList.add('error');
    }

    let ws = null;
    let audioCtx = null;
    let processorNode = null;
    let sampleRate = 48000;
    let encoding = 'pcm';
    let decoder = null;
    let decoderTimestamp = 0;
    let isPlaying = false;
    let streamEnded = false;

    // =====================
    // PCM Ring Buffer
    // Larger buffer (30s) for stability
    // =====================

    const BUFFER_SECONDS = 30;
    let pcmBuffer = null;
    let writePos = 0;
    let readPos = 0;
    let bufferedSamples = 0;
    let playbackStarted = false;
    const PREBUFFER_SAMPLES = 48000 * 0.8; // 800ms prebuffer for smooth start

    function initBuffer() {
      pcmBuffer = new Float32Array(sampleRate * BUFFER_SECONDS);
      writePos = 0;
      readPos = 0;
      bufferedSamples = 0;
      playbackStarted = false;
    }

    function writeFloat32ToBuffer(float32) {
      const bufLen = pcmBuffer.length;
      for (let i = 0; i < float32.length; i++) {
        pcmBuffer[writePos] = float32[i];
        writePos = (writePos + 1) % bufLen;
        bufferedSamples = Math.min(bufferedSamples + 1, bufLen);
      }
    }

    function writeInt16ToBuffer(int16Array) {
      const bufLen = pcmBuffer.length;
      for (let i = 0; i < int16Array.length; i++) {
        pcmBuffer[writePos] = int16Array[i] / (int16Array[i] < 0 ? 0x8000 : 0x7FFF);
        writePos = (writePos + 1) % bufLen;
        bufferedSamples = Math.min(bufferedSamples + 1, bufLen);
      }
    }

    // =====================
    // Opus Decoder (WebCodecs)
    // =====================

    function initDecoder() {
      if (typeof AudioDecoder === 'undefined') {
        encoding = 'pcm';
        return;
      }

      decoder = new AudioDecoder({
        output: (audioData) => {
          const float32 = new Float32Array(audioData.numberOfFrames);
          audioData.copyTo(float32, { planeIndex: 0 });
          writeFloat32ToBuffer(float32);
          audioData.close();
        },
        error: () => {} // Opus decode errors are recoverable, just skip
      });

      decoder.configure({
        codec: 'opus',
        sampleRate: 48000,
        numberOfChannels: 1,
      });

      decoderTimestamp = 0;
    }

    function decodeOpusChunk(data) {
      if (!decoder || decoder.state !== 'configured') return;
      const chunk = new EncodedAudioChunk({
        type: 'key',
        timestamp: decoderTimestamp,
        data: data,
      });
      decoder.decode(chunk);
      decoderTimestamp += 20000;
    }

    // =====================
    // Audio Playback
    // 4096 buffer for smoother output (less chance of underrun)
    // Gain node for volume normalization
    // =====================

    let gainNode = null;

    function startPlayback() {
      if (audioCtx) return; // Already playing

      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
      audioCtx.resume();

      initBuffer();

      if (encoding === 'opus') {
        initDecoder();
      }

      setupBackgroundAudio();

      // 4096 = ~85ms buffer — much smoother than 2048
      processorNode = audioCtx.createScriptProcessor(4096, 1, 1);

      // Gain node for consistent volume
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 1.0;

      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;

      // Smoothing: track RMS for gentle volume normalization
      let rmsSmoothed = 0;

      processorNode.onaudioprocess = (e) => {
        const output = e.outputBuffer.getChannelData(0);
        const bufLen = pcmBuffer.length;
        const needed = output.length;

        if (bufferedSamples < needed) {
          // Underrun: gentle fade to silence instead of hard cut
          for (let i = 0; i < needed; i++) {
            if (bufferedSamples > 0) {
              output[i] = pcmBuffer[readPos] * (bufferedSamples / needed);
              readPos = (readPos + 1) % bufLen;
              bufferedSamples--;
            } else {
              output[i] = 0;
            }
          }
          return;
        }

        for (let i = 0; i < needed; i++) {
          output[i] = pcmBuffer[readPos];
          readPos = (readPos + 1) % bufLen;
        }
        bufferedSamples -= needed;

        // Soft skip if >3s behind live (gradual, not jarring)
        if (bufferedSamples > sampleRate * 3) {
          const skip = bufferedSamples - Math.floor(sampleRate * 0.8);
          readPos = (readPos + skip) % bufLen;
          bufferedSamples -= skip;
        }

        // Auto-gain: gently normalize volume to prevent fluctuation
        let rms = 0;
        for (let i = 0; i < needed; i++) rms += output[i] * output[i];
        rms = Math.sqrt(rms / needed);
        rmsSmoothed = rmsSmoothed * 0.95 + rms * 0.05;

        if (rmsSmoothed > 0.001) {
          const targetRms = 0.15; // comfortable listening level
          const currentGain = gainNode.gain.value;
          const desiredGain = Math.min(3.0, Math.max(0.5, targetRms / rmsSmoothed));
          // Smooth gain changes to avoid clicks
          gainNode.gain.value = currentGain * 0.97 + desiredGain * 0.03;
        }
      };

      processorNode.connect(gainNode);
      gainNode.connect(analyser);
      analyser.connect(audioCtx.destination);

      isPlaying = true;

      // Level meter
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      function updateMeter() {
        if (!isPlaying) return;
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        const avg = sum / dataArray.length;
        levelBar.style.width = Math.min(100, (avg / 128) * 100) + '%';
        requestAnimationFrame(updateMeter);
      }
      updateMeter();
    }

    // =====================
    // Background Audio
    // =====================

    function setupBackgroundAudio() {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: 'LiveDrop',
          artist: 'Live Stream',
        });
        // Prevent pause/stop from media controls
        navigator.mediaSession.setActionHandler('pause', () => {});
        navigator.mediaSession.setActionHandler('stop', () => {});
      }

      // Silent <audio> loop keeps iOS audio session alive
      const keepAlive = document.createElement('audio');
      // 1 second of near-silence WAV (more reliable than ultra-short)
      keepAlive.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
      keepAlive.loop = true;
      keepAlive.volume = 0.01;
      keepAlive.play().catch(() => {});

      // Resume on visibility change
      document.addEventListener('visibilitychange', () => {
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        // Reconnect WebSocket if it died in background
        if (document.visibilityState === 'visible' && ws && ws.readyState > WebSocket.OPEN) {
          reconnect();
        }
      });
    }

    // =====================
    // WebSocket with Auto-Reconnect
    // =====================

    let reconnectTimer = null;
    let reconnectAttempts = 0;

    function connect() {
      if (ws && ws.readyState <= WebSocket.OPEN) return;

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        reconnectAttempts = 0;
        ws.send(JSON.stringify({ type: 'join', sessionId }));
        if (isPlaying) {
          statusEl.textContent = '';
        }
      };

      ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          if (!pcmBuffer) return;

          if (encoding === 'opus') {
            decodeOpusChunk(event.data);
          } else {
            writeInt16ToBuffer(new Int16Array(event.data));
          }

          if (!playbackStarted && bufferedSamples >= PREBUFFER_SAMPLES) {
            playbackStarted = true;
          }
          return;
        }

        const msg = JSON.parse(event.data);

        if (msg.type === 'joined') {
          if (!isPlaying) {
            statusEl.textContent = 'Waiting for audio...';
            statusEl.classList.add('connected');
            playBtn.classList.add('visible');
          }
        }

        if (msg.type === 'config') {
          sampleRate = msg.sampleRate || 48000;
          encoding = msg.encoding || 'pcm';
          // Re-init decoder if needed after reconnect
          if (encoding === 'opus' && isPlaying && (!decoder || decoder.state !== 'configured')) {
            initDecoder();
          }
        }

        if (msg.type === 'listeners') {
          listenerCount.textContent = msg.count;
        }

        if (msg.type === 'ended') {
          streamEnded = true;
          statusEl.textContent = '';
          listeningSection.classList.remove('active');
          playBtn.classList.remove('visible');
          endedSection.classList.add('active');
        }

        if (msg.type === 'error') {
          statusEl.textContent = msg.message;
          statusEl.classList.add('error');
        }
      };

      ws.onclose = () => {
        if (streamEnded) return;
        reconnect();
      };

      ws.onerror = () => {};
    }

    function reconnect() {
      if (streamEnded) return;
      if (reconnectTimer) return;

      reconnectAttempts++;
      const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts - 1), 10000);

      if (isPlaying) {
        statusEl.textContent = 'Reconnecting...';
      }

      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, delay);
    }

    // =====================
    // Play Button
    // =====================

    playBtn.addEventListener('click', () => {
      playBtn.classList.remove('visible');
      statusEl.textContent = '';
      listeningSection.classList.add('active');
      startPlayback();
    });

    // --- Init ---
    if (sessionId) {
      connect();
    }
  </script>
</body>
</html>
