<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>LiveDrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .status {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      min-height: 20px;
    }
    .status.error { color: #ff3b30; }
    .status.connected { color: #30d158; }

    .btn-play {
      width: 100%;
      padding: 20px;
      background: #30d158;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
      display: none;
    }
    .btn-play:hover { opacity: 0.85; }
    .btn-play.visible { display: block; }

    .listening-section {
      display: none;
      margin-top: 16px;
    }
    .listening-section.active { display: block; }

    .live-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .live-dot {
      width: 12px; height: 12px;
      background: #ff3b30;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.6); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(255, 59, 48, 0); }
    }
    .live-text {
      font-size: 14px;
      font-weight: 700;
      color: #ff3b30;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .level-meter {
      width: 100%;
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .level-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #30d158, #30d158);
      border-radius: 3px;
      transition: width 0.08s linear;
    }

    .listener-count {
      font-size: 14px;
      color: #888;
    }
    .listener-count span { color: #30d158; font-weight: 600; }

    .ended {
      display: none;
      margin-top: 32px;
      font-size: 16px;
      color: #888;
    }
    .ended.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LiveDrop</h1>
    <div class="status" id="status">Connecting...</div>

    <div id="pinSection" style="display:none;margin-bottom:16px;">
      <input type="number" id="pinInput" placeholder="Enter PIN" inputmode="numeric" maxlength="6"
        style="width:100%;padding:14px 16px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:10px;font-size:18px;font-family:inherit;text-align:center;margin-bottom:12px;-moz-appearance:textfield;"
        oninput="this.value=this.value.slice(0,6)">
      <button id="pinSubmitBtn" style="width:100%;padding:14px;background:#30d158;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;">Submit</button>
    </div>

    <button class="btn-play" id="playBtn">Play</button>

    <div class="listening-section" id="listeningSection">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">Listening</span>
      </div>
      <canvas id="visualizer" style="width:100%;height:80px;margin-bottom:16px;border-radius:8px;"></canvas>
      <div class="level-meter">
        <div class="level-bar" id="levelBar"></div>
      </div>
      <div class="listener-count">
        <span id="listenerCount">0</span> listeners
      </div>
    </div>

    <div class="ended" id="endedSection">Stream ended.</div>
  </div>

  <script type="module" src="/js/listener/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
